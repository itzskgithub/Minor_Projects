<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="p2.css">
</head>
<body>
    <!-- HOME Header -->
    <h1 class="heading">
        <a href="index.html">HOME</a>
    </h1>

    <!-- BMI Calculator Container -->
    <div class="bmi-container">
        <h1>BMI Calculator</h1>
        <form>
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" placeholder="Enter weight" required>

            <label for="height">Height (cm):</label>
            <input type="number" id="height" placeholder="Enter height" required>

            <button type="button" id="button">Calculate BMI</button>
        </form>
        <div class="bmi-result">Your BMI will appear here</div>
    </div>

    <!-- JS -->
    <script src="p2.js"></script>
</body>
</html>
